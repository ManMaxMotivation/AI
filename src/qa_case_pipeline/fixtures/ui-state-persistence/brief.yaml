title: Preserve offer filters after catalog navigation
summary: A visitor configures an offer estimator and opens the related catalog. Their selected filters must remain visible and represented in the destination URL.
change: Persist estimator filters while navigating from the estimator to a catalog view.
acceptance_criteria:
  - The selected catalog remains selected after navigation.
  - Every supported estimator filter remains unchanged after navigation.
  - The destination URL represents the selected filter values.
  - A control catalog keeps its own independent state.
known_risks:
  - A partial state restore can show a valid catalog with one silently reset filter.
  - Shared query parameters can leak filters between catalogs.
constraints:
  - This is a synthetic example with no production URL, account, or customer data.
  - Reference checks use local JSON fixtures only.
case_type: ui_state_persistence
