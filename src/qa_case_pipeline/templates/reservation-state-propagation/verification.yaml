requirements:
  - id: R-001
    text: Reserved and unavailable item pages remain reachable and expose the intended customer-facing state.
  - id: R-002
    text: Reservation actions are disabled and have no checkout destination when inventory is not available.
  - id: R-003
    text: The available-item purchase path remains enabled.
  - id: R-004
    text: A stale item page cannot offer an actionable checkout path after checkout rejects the reservation.
evidence:
  available_page: evidence/available-page.json
  reserved_page: evidence/reserved-page.json
  unavailable_page: evidence/unavailable-page.json
  comparison_page: evidence/comparison-page.json
  transition_window: evidence/transition-window.json
automated_checks:
  - id: AUTO-001
    requirement: R-001
    purpose: Reserved page is reachable and displays the reserved state.
    source: reserved_page
    assertions:
      - pointer: /http_status
        operator: equals
        value: 200
      - pointer: /reservation/state
        operator: equals
        value: reserved
      - pointer: /ui/state_label
        operator: equals
        value: Reserved
  - id: AUTO-002
    requirement: R-001
    purpose: Unavailable page is reachable and displays the product-approved state label.
    source: unavailable_page
    assertions:
      - pointer: /http_status
        operator: equals
        value: 200
      - pointer: /reservation/state
        operator: equals
        value: unavailable
      - pointer: /ui/state_label
        operator: equals
        value: Expected
  - id: AUTO-003
    requirement: R-002
    purpose: Reserved desktop action is disabled and cannot carry a checkout link.
    source: reserved_page
    assertions:
      - pointer: /ui/desktop_action/enabled
        operator: equals
        value: false
      - pointer: /ui/desktop_action/href
        operator: exists
        value: false
  - id: AUTO-004
    requirement: R-002
    purpose: Unavailable mobile action is disabled and cannot carry a checkout link.
    source: unavailable_page
    assertions:
      - pointer: /ui/mobile_action/enabled
        operator: equals
        value: false
      - pointer: /ui/mobile_action/href
        operator: exists
        value: false
  - id: AUTO-005
    requirement: R-002
    purpose: Related comparison view cannot initiate checkout for an unavailable item.
    source: comparison_page
    assertions:
      - pointer: /item_state
        operator: equals
        value: unavailable
      - pointer: /reserve_action/enabled
        operator: equals
        value: false
      - pointer: /reserve_action/href
        operator: exists
        value: false
  - id: AUTO-006
    requirement: R-003
    purpose: Available item retains the normal active action and checkout target.
    source: available_page
    assertions:
      - pointer: /reservation/state
        operator: equals
        value: available
      - pointer: /ui/desktop_action/enabled
        operator: equals
        value: true
      - pointer: /ui/desktop_action/href
        operator: matches
        value: ^/checkout/
  - id: AUTO-007
    requirement: R-004
    purpose: Transition window blocks a stale checkout path once checkout rejects the item.
    source: transition_window
    assertions:
      - pointer: /checkout_response/status
        operator: equals
        value: 410
      - pointer: /page_snapshot/reservation/state
        operator: equals
        value: available
      - pointer: /page_snapshot/ui/desktop_action/enabled
        operator: equals
        value: false
      - pointer: /page_snapshot/ui/desktop_action/href
        operator: exists
        value: false
manual_checks:
  - id: MANUAL-001
    requirement: R-001
    purpose: Inspect reserved and unavailable pages in a real desktop browser.
    expected: Labels, layout, and accessibility semantics are understandable and visually correct.
  - id: MANUAL-002
    requirement: R-002
    purpose: Inspect desktop, mobile, and comparison controls using keyboard and pointer interaction.
    expected: Disabled controls neither navigate nor expose an actionable focus path to checkout.
  - id: MANUAL-003
    requirement: R-003
    purpose: Complete the normal purchase journey for an available item in an approved environment.
    expected: The existing checkout journey opens and completes according to product rules.
  - id: MANUAL-004
    requirement: R-004
    purpose: Reproduce the propagation interval after a reservation, where the checkout service and page snapshot update at different times.
    expected: A customer never reaches a misleading error through an active reservation control.
